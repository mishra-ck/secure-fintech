spring:
  application:
    name: secure-fintech

# ------- APP Properties  ------
app:
  jwt:
    secret: "SecureFintech-JWT-256-bit-secret-key-long-enough-for-HMAC-SHA256"
    issuer: secure-fintech
    access-expiry-seconds: 900       # 15 minutes
    refresh-expiry-seconds: 86400    # 24 hrs
    stepup-expiry-seconds: 300       # 5 minutes

  encryption:
    aes-key: "dGhpcyBpcyBhIDMyIGJ5dGUgQUVTIGtleSBoZXJlIQ"
    hmac-key: "dGhpcyBpcyBhIDMyIGJ5dGUgSE1BQyBrZXkgaGVyZSE"

  security:
    max-failed-attempts: 5
    lockout-minutes: 30